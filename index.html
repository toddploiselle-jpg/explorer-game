async function loadLeaders(){try{var snap=await firebase.database().ref("lyw-leaders").once("value");if(snap.exists()){var data=snap.val();if(Array.isArray(data)&&data.length>0)return data;}return SEED_LEADERS;}catch(e){return SEED_LEADERS;}}
async function saveLeader(entry){try{var leaders=await loadLeaders();leaders.push(entry);leaders.sort(function(a,b){return b.score-a.score;});leaders=leaders.slice(0,5);await firebase.database().ref("lyw-leaders").set(leaders);return leaders;}catch(e){var fallback=SEED_LEADERS.slice();fallback.push(entry);fallback.sort(function(a,b){return b.score-a.score;});return fallback.slice(0,5);}}

async function loadStats() {
  var saved = { total: 0, memorizer: 0, skimmer: 0, specialist: 0, explorer: 0 };
  try {
    var snap = await firebase.database().ref("lyw-stats").once("value");
    if (snap.exists()) saved = snap.val();
  } catch (e) { console.error("Load stats error:", e); }
  var o = {};
  for (var k in BASELINE) o[k] = BASELINE[k] + (saved[k] || 0);
  return o;
}
async function saveResult(k) {
  var saved = { total: 0, memorizer: 0, skimmer: 0, specialist: 0, explorer: 0 };
  try {
    var ref = firebase.database().ref("lyw-stats");
    await ref.transaction(function(current) {
      if (!current) current = { total: 0, memorizer: 0, skimmer: 0, specialist: 0, explorer: 0 };
      current.total = (current.total || 0) + 1;
      current[k] = (current[k] || 0) + 1;
      return current;
    });
    var snap = await ref.once("value");
    if (snap.exists()) saved = snap.val();
  } catch (e) { console.error("Save result error:", e); saved.total++; saved[k] = (saved[k] || 0) + 1; }
  var o = {};
  for (var k2 in BASELINE) o[k2] = BASELINE[k2] + (saved[k2] || 0);
  return o;
}

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

        <h1 className="h1" style={{fontSize:"clamp(28px,7vw,38px)",marginBottom:6}}>Do you have an Explorer's Mindset?</h1>
        <p className="bd" style={{fontSize:16,maxWidth:260,marginBottom:16}}>9 quick challenges. 3 minutes.</p>
        <p style={{fontFamily:"'Libre Baskerville',serif",fontSize:17,color:"#1a1a1a",marginBottom:20,maxWidth:280}}>Only 14% of people do. Do you?</p>
        {stats.total>0&&<div style={{marginBottom:20}}><span style={{fontFamily:"Manrope,sans-serif",fontSize:34,fontWeight:800,color:"#1a1a1a",display:"block",letterSpacing:"-0.02em"}}>{stats.total.toLocaleString()}</span><span style={{fontFamily:"Manrope,sans-serif",fontSize:15,fontWeight:600,color:"#bbb",letterSpacing:"0.1em",textTransform:"uppercase"}}>students have played</span></div>}
        <button className="pill pd" onClick={function(){go(function(){setScreen("challenge");});}}>Do I?</button>
      </div>}

      {screen==="challenge"&&CurG&&<div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-start",paddingTop:24,paddingBottom:32}}><CurG onDone={handleDone}/></div>}

      {screen==="result"&&td&&vd&&<div style={{paddingTop:28,paddingBottom:56}}>
        <div className="bounce" style={{textAlign:"center",marginBottom:20}}><p className="tg" style={{margin:"0 0 6px",color:td.color}}>YOU ARE</p><h1 className="h1" style={{fontSize:"clamp(28px,7vw,38px)",marginBottom:4,color:td.color}}>{td.name}</h1><p style={{fontFamily:"'Libre Baskerville',serif",fontSize:17,fontStyle:"italic",color:"#999",textAlign:"center"}}>{td.tag}</p></div>
        <div style={{textAlign:"center",marginBottom:18}}><div style={{display:"inline-block",padding:"10px 20px",borderRadius:14,background:"#fafafa",border:"1px solid #eee"}}><span style={{fontFamily:"Manrope,sans-serif",fontSize:17,fontWeight:800,color:"#1a1a1a"}}>{points} pts</span><span style={{fontFamily:"Manrope,sans-serif",fontSize:17,color:"#aaa",marginLeft:8}}>Explorer Score: <span style={{fontWeight:800,color:"#1a1a1a"}}>{ePct}%</span></span></div></div>
        <div style={{padding:"16px 20px",borderRadius:14,background:"#fafafa",border:"1px solid #eee",marginBottom:18}}><p className="bd" style={{color:"#555",fontSize:17,lineHeight:1.7}}>{td.desc}</p></div>

        <div style={{padding:"20px",borderRadius:14,border:"1.5px solid "+td.color+"33",marginBottom:18}}><p className="tg" style={{marginBottom:10,color:td.color}}>THE EXPLORER'S LOOP</p>
          {LOOP.map(function(step,i){var stepKeys=["observe","experiment","evaluate","adjust","repeat"];var need=i<4?2:1;var isLit=steps[stepKeys[i]]>=need;var isNext=!isLit&&(i===0||steps[stepKeys[i-1]]>=(i-1<4?2:1));
            return <div key={step.n} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<4?"1px solid #f0f0f0":"none"}}>
              <span style={{fontFamily:"Manrope,sans-serif",fontSize:16,fontWeight:800,color:isLit?td.color:isNext?"#1a1a1a":"#ddd",minWidth:18}}>{i+1}</span>
              <span style={{fontFamily:"Manrope,sans-serif",fontWeight:700,fontSize:17,color:isLit?td.color:isNext?"#1a1a1a":"#bbb",minWidth:72}}>{step.n}</span>
              <span style={{fontFamily:"Manrope,sans-serif",fontSize:17,color:isLit?"#666":isNext?"#666":"#ccc",flex:1}}>{step.s}</span>
              {isLit&&<span style={{fontFamily:"Manrope,sans-serif",fontSize:8,fontWeight:700,color:"#fff",background:td.color,padding:"3px 6px",borderRadius:100}}>{"\u2713"}</span>}
              {isNext&&<span style={{fontFamily:"Manrope,sans-serif",fontSize:8,fontWeight:700,color:"#fff",background:"#1a1a1a",padding:"3px 8px",borderRadius:100,letterSpacing:"0.06em",textTransform:"uppercase",whiteSpace:"nowrap"}}>Start here</span>}
            </div>;})}</div>

        <div style={{padding:"20px",borderRadius:14,border:"2px solid #1a1a1a",marginBottom:18}}><p className="tg" style={{marginBottom:6,color:"#1a1a1a"}}>IF YOU ONLY DO ONE THING</p><p style={{fontFamily:"'Libre Baskerville',serif",fontSize:17,color:"#1a1a1a",lineHeight:1.7,textAlign:"left"}}>{td.tryThis}</p></div>
        <p style={{fontFamily:"'Libre Baskerville',serif",fontSize:16,fontStyle:"italic",color:"#aaa",textAlign:"center",margin:"0 0 18px",lineHeight:1.6}}>{td.growth}</p>

        <div style={{padding:"16px 20px",borderRadius:14,background:vd.color+"08",border:"1px solid "+vd.color+"22",marginBottom:18}}><p className="tg" style={{marginBottom:4}}>YOUR LOUDEST VOICE</p><p style={{fontFamily:"Manrope,sans-serif",fontSize:17,fontWeight:700,color:"#1a1a1a",margin:0,textAlign:"left"}}>{vd.name} <span style={{fontWeight:400,color:"#aaa"}}>{"\u2014"} {vd.short}</span></p><p style={{fontFamily:"Manrope,sans-serif",fontSize:16,fontWeight:600,fontStyle:"italic",color:"#1a1a1a",margin:"8px 0 0",textAlign:"left"}}>{vd.tip}</p></div>

        <p className="tg" style={{marginBottom:12}}>HOW EVERYONE SCORED</p>
        {TKEYS.map(function(k){var count=stats[k]||0;var pct=Math.round((count/total)*100);var me=result.key===k;
          return <div key={k} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontFamily:"Manrope,sans-serif",fontSize:16,fontWeight:me?700:500,color:me?TYPES[k].color:"#aaa"}}>{TYPES[k].name}{me?" \u2190":""}</span><span style={{fontFamily:"Manrope,sans-serif",fontSize:16,fontWeight:700,color:me?TYPES[k].color:"#ddd"}}>{pct}%</span></div><div className="bt"><div className="bf" style={{width:Math.max(pct,3)+"%",background:me?TYPES[k].color:"#e8e8e8"}}/></div><span style={{fontFamily:"Manrope,sans-serif",fontSize:16,color:"#ccc",marginTop:2,display:"block"}}>{count.toLocaleString()} students</span></div>;})}

        <div style={{height:16}}/>

        <div style={{padding:"16px 20px",borderRadius:14,border:"1.5px solid #E8913A22",marginBottom:18}}>
          <p className="tg" style={{marginBottom:12,color:"#E8913A"}}>TOP 5 SCORES</p>
          {leaders.map(function(entry,i){var isMe=lSaved&&entry.name===lName;return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<4?"1px solid #f0f0f0":"none"}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontFamily:"Manrope,sans-serif",fontSize:18,fontWeight:800,color:i===0?"#E8913A":i===1?"#aaa":i===2?"#b87333":"#ddd",width:22}}>{i+1}.</span><span style={{fontFamily:"Manrope,sans-serif",fontSize:16,fontWeight:isMe?700:500,color:isMe?"#1a1a1a":"#666"}}>{entry.name}{isMe?" \u2190":""}</span></div><span style={{fontFamily:"Manrope,sans-serif",fontSize:16,fontWeight:700,color:isMe?"#E8913A":"#aaa"}}>{entry.score} pts</span></div>;})}
          {!lSaved&&points>(leaders.length>0?leaders[leaders.length-1].score:0)&&<div style={{marginTop:12,padding:"12px 16px",borderRadius:10,background:"#E8913A08",border:"1px solid #E8913A22"}}><p style={{fontFamily:"Manrope,sans-serif",fontSize:16,fontWeight:700,color:"#E8913A",marginBottom:8,textAlign:"center"}}>You made the top 5!</p><div style={{display:"flex",gap:8}}><input type="text" value={lName} onChange={function(e){setLName(e.target.value);}} placeholder="Enter your name" maxLength={20} style={{flex:1,padding:"10px 14px",borderRadius:10,border:"1.5px solid #ddd",fontFamily:"Manrope,sans-serif",fontSize:16,outline:"none"}}/><button className="pill pd" style={{padding:"10px 18px",fontSize:15}} onClick={function(){if(!lName.trim())return;saveLeader({name:lName.trim(),score:points,type:result.key}).then(function(updated){setLeaders(updated);setLSaved(true);});}}>{"\u2714"}</button></div></div>}
          {lSaved&&<p style={{fontFamily:"Manrope,sans-serif",fontSize:15,color:"#4CAF50",textAlign:"center",marginTop:8,fontWeight:600}}>Saved!</p>}
        </div>

        <div style={{textAlign:"center",marginBottom:16}}><button className="pill po" onClick={function(){setShow(show==="types"?"":"types");}}>{show==="types"?"Hide":"All 4 types"}</button></div>
        {show==="types"&&<div style={{marginBottom:20}}>{TKEYS.map(function(k){var d=TYPES[k],me=result.key===k;return <div key={k} style={{padding:"12px 16px",marginBottom:6,borderRadius:12,background:me?"#f8f8f8":"#fff",border:me?"1.5px solid "+d.color+"22":"1px solid #eee"}}><span style={{fontFamily:"Manrope,sans-serif",fontSize:16,fontWeight:700,color:d.color}}>{d.name}{me?" \u2190":""}</span><p className="bd" style={{fontSize:16,marginTop:2}}>{d.tag}</p></div>;})}</div>}

        <div style={{textAlign:"center",padding:"18px 0",borderTop:"1px solid #f0f0f0",borderBottom:"1px solid #f0f0f0",marginBottom:20}}><h3 className="h1" style={{fontSize:17,marginBottom:6}}>Challenge a friend</h3>
          <button className="pill pd" style={{padding:"10px 20px",fontSize:16}} onClick={function(){var text="I got "+td.name+" with "+ePct+"% Explorer Score.\n\nOnly 14% have an Explorer\u2019s Mindset. Do you?\n\ngame.talonstone.com";try{var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(function(){setCopied(false);},2500);}catch(e){setCopied("show");}}}>{copied===true?"Copied!":"Send to a Friend"}</button>
          {copied==="show"&&<div style={{marginTop:12,padding:"12px 16px",borderRadius:10,background:"#fafafa",border:"1px solid #eee",textAlign:"left"}}><p style={{fontFamily:"Manrope,sans-serif",fontSize:16,color:"#555",lineHeight:1.6,userSelect:"all"}}>{"I got "+td.name+" with "+ePct+"% Explorer Score.\n\nOnly 14% have an Explorer\u2019s Mindset. Do you?\n\ngame.talonstone.com"}</p></div>}
        </div>

        <div style={{textAlign:"center",padding:"20px 0"}}><img src={BOOK_COVER} alt="Learning Your Way" style={{width:88,marginBottom:12,borderRadius:4,boxShadow:"0 4px 16px rgba(0,0,0,.08)"}} onError={function(e){e.target.style.display="none";}}/><h3 className="h1" style={{fontSize:17,marginBottom:4}}>The full system.</h3><p className="bd" style={{fontSize:16,maxWidth:240,margin:"0 auto 14px"}}>The Explorer's Loop. The Toolkit. All 11 levels.</p>
          <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}><a href={AMAZON} target="_blank" rel="noopener noreferrer" className="pill pd" style={{fontSize:16,padding:"10px 20px"}}>Get the Book</a><a href={ASK} target="_blank" rel="noopener noreferrer" className="pill po" style={{fontSize:16}}>Ask the Book</a></div></div>
        <div style={{textAlign:"center",paddingTop:10}}><button className="pill po" style={{fontSize:16}} onClick={restart}>Play Again</button></div>
        <p style={{textAlign:"center",fontFamily:"Manrope,sans-serif",fontSize:14,color:"#ddd",marginTop:16}}>{"\u00A9 "+new Date().getFullYear()+" Talonstone Holdings LLC"}</p>
      </div>}
    </div>
  </div>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
